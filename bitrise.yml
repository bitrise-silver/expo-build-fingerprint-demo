---
format_version: "23"
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git
project_type: react-native

tools:
  nodejs: 22.23.1

trigger_map:
  - push_branch: "*"
    workflow: build_fingerprint
  - pull_request_target_branch: "*"
    workflow: build_fingerprint

workflows:
  build_fingerprint:
    summary: |
      Fingerprints the dependency files into a cache key, restores that key, and only
      runs `expo export` when restore-cache reports a miss.
    description: |
      Demonstrates the free Bitrise key-value cache "build skip" pattern for Expo:
        1. steps-react-native-fingerprint fingerprints the deps into BUNDLE_HASH_STRING.
        2. restore-cache tries that key and reports the result in BITRISE_CACHE_HIT.
        3. `expo export` runs only on a miss; the export is saved under BUNDLE_HASH_STRING.
      When only App.tsx changes, the dependency fingerprint is unchanged, so subsequent builds
      hit the cache and skip re-exporting.
    steps:
      - git-clone@8: {}
      - restore-npm-cache@3: {}
      - npm@3:
          title: npm ci
          inputs:
            - command: ci
      - save-npm-cache@1: {}
      - git::https://github.com/bitrise-silver/steps-react-native-fingerprint.git@main:
          title: Fingerprint deps → cache key
          inputs:
            - file_paths: |-
                package.json
                package-lock.json
            - key_prefix: expo-build-skip
            - verbose: "true"
      - restore-cache@3:
          title: Restore cached Expo export
          inputs:
            - key: $BUNDLE_HASH_STRING
      - script@1:
          title: Expo export (cache miss only)
          run_if: '{{ enveq "BITRISE_CACHE_HIT" "false" }}'
          inputs:
            - content: |-
                #!/usr/bin/env bash
                set -euo pipefail
                echo "Cache miss — running expo export from scratch…"
                npx expo export --platform android --output-dir dist
      - script@1:
          title: Expo prebuild Android (cache miss only)
          run_if: '{{ enveq "BITRISE_CACHE_HIT" "false" }}'
          inputs:
            - content: |-
                #!/usr/bin/env bash
                set -euo pipefail
                echo "Generating native Android project with expo prebuild…"
                npx expo prebuild --platform android --no-install
      - script@1:
          title: Reuse cached Expo export (cache hit only)
          run_if: '{{ not (enveq "BITRISE_CACHE_HIT" "false") }}'
          inputs:
            - content: |-
                #!/usr/bin/env bash
                set -euo pipefail
                echo "Cache hit (BITRISE_CACHE_HIT=$BITRISE_CACHE_HIT, key=$BUNDLE_HASH_STRING) — skipping expo export."
                ls -lh dist || true
      - gradle-runner@5:
          title: Build Android APK
          inputs:
            - build_root_directory: android
            - gradle_task: assembleRelease
            - gradlew_path: gradlew
      - save-cache@1:
          title: Save Expo export + Android build for next time (cache miss only)
          run_if: '{{ enveq "BITRISE_CACHE_HIT" "false" }}'
          inputs:
            - key: $BUNDLE_HASH_STRING
            - paths: |-
                dist
                android/app/build/outputs
                android/build
                android/.gradle
      - deploy-to-bitrise-io@2: {}
    meta:
      bitrise.io:
        stack: ubuntu-noble-24.04-bitrise-2025-android
        machine_type_id: g2.linux.large
