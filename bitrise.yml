---
format_version: "23"
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git
project_type: react-native

tools:
  nodejs: 22.23.1

trigger_map:
  - push_branch: "*"
    workflow: build_android_fingerprint
  - pull_request_target_branch: "*"
    workflow: build_android_fingerprint

workflows:

  # ==========================================================================================
  # Android — fingerprint-based native-skip (DIY, free key-value cache)
  # ==========================================================================================
  build_android_fingerprint:
    summary: |
      Fingerprints the NATIVE build inputs. On a cache hit it reuses the prebuilt APK by swapping
      in a freshly built JS bundle and re-signing — skipping the slow Gradle build entirely.
    description: |
      Native-skip pattern for Expo / Android:
        1. steps-react-native-fingerprint hashes the *native* inputs (package.json, package-lock.json,
           app.json) into BUNDLE_HASH_STRING. JS source (App.tsx) is deliberately NOT part of the key.
        2. restore-cache tries that key and reports BITRISE_CACHE_HIT.
        3. MISS  → expo prebuild + `gradle assembleRelease`; the signed APK and Expo's debug keystore
                   are cached under BUNDLE_HASH_STRING.
        4. HIT   → rebuild ONLY the JS bundle (Hermes), swap assets/index.android.bundle inside the
                   cached APK, zipalign + re-sign. No Gradle, no native compile.

      So a JS-only change (App.tsx) leaves the native fingerprint unchanged and takes the fast HIT
      path; a dependency or app.json change busts the key and does a full native build once.
    steps:
      - git-clone@8: {}
      - restore-npm-cache@3: {}
      - npm@3:
          title: npm ci
          inputs:
            - command: ci
      - save-npm-cache@1: {}
      - git::https://github.com/bitrise-silver/steps-react-native-fingerprint.git@main:
          title: Fingerprint native inputs → cache key
          inputs:
            - file_paths: |-
                package.json
                package-lock.json
                app.json
            - key_prefix: build-fingerprint-android
            - verbose: "true"
      - restore-cache@3:
          title: Restore cached APK (native build)
          inputs:
            - key: $BUNDLE_HASH_STRING

      # ---------------- MISS: full native build (slow, runs once per native change) --------------
      - script@1:
          title: "[miss] Expo prebuild (Android)"
          run_if: '{{ enveq "BITRISE_CACHE_HIT" "false" }}'
          inputs:
            - content: |-
                #!/usr/bin/env bash
                set -euo pipefail
                echo "Cache MISS — generating the native Android project…"
                npx expo prebuild --platform android --no-install
      - gradle-runner@5:
          title: "[miss] Build Android APK (assembleRelease)"
          run_if: '{{ enveq "BITRISE_CACHE_HIT" "false" }}'
          inputs:
            - build_root_directory: android
            - gradle_task: assembleRelease
            - gradlew_path: gradlew
      - script@1:
          title: "[miss] Cache the signed APK + keystore"
          run_if: '{{ enveq "BITRISE_CACHE_HIT" "false" }}'
          inputs:
            - content: |-
                #!/usr/bin/env bash
                set -euo pipefail
                mkdir -p _nativecache
                APK="$(ls android/app/build/outputs/apk/release/*.apk | head -1)"
                cp "$APK" _nativecache/app-release.apk
                # Expo signs the release build with android/app/debug.keystore. Cache it so the HIT
                # path can re-sign with the identical key (stable signature across builds).
                cp android/app/debug.keystore _nativecache/debug.keystore
                cp _nativecache/app-release.apk "$BITRISE_DEPLOY_DIR/app-release.apk"
                echo "Stashed $(du -h _nativecache/app-release.apk | cut -f1) APK for the cache."
      - save-cache@1:
          title: "[miss] Save native APK for next time"
          run_if: '{{ enveq "BITRISE_CACHE_HIT" "false" }}'
          inputs:
            - key: $BUNDLE_HASH_STRING
            - paths: _nativecache

      # ---------------- HIT: reuse APK, swap JS bundle (fast) ------------------------------------
      - script@1:
          title: "[hit] Swap JS bundle into cached APK (skip Gradle)"
          run_if: '{{ not (enveq "BITRISE_CACHE_HIT" "false") }}'
          inputs:
            - content: |-
                #!/usr/bin/env bash
                set -euo pipefail
                echo "Cache HIT — patching a fresh JS bundle into the cached APK (no Gradle)."

                SDK="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-}}"
                BT="$(ls -d "$SDK"/build-tools/*/ | sort -V | tail -1)"
                WORK="$(mktemp -d)"
                OUT="$BITRISE_DEPLOY_DIR/app-release.apk"
                mkdir -p "$WORK/assets" _bundle_res

                # 1) Build the JS bundle exactly like the native build would (same command Gradle calls).
                npx expo export:embed \
                  --platform android \
                  --dev false \
                  --entry-file index.ts \
                  --bundle-output "$WORK/assets/index.android.bundle" \
                  --assets-dest _bundle_res

                # 2) Expo/RN default to Hermes → compile the bundle to bytecode (what the APK expects).
                HERMESC="node_modules/react-native/sdks/hermesc/linux64-bin/hermesc"
                if [ -x "$HERMESC" ]; then
                  echo "Hermes enabled — compiling bundle to bytecode…"
                  "$HERMESC" -emit-binary -O -out "$WORK/assets/index.android.bundle.hbc" "$WORK/assets/index.android.bundle"
                  mv "$WORK/assets/index.android.bundle.hbc" "$WORK/assets/index.android.bundle"
                fi

                # 3) Replace assets/index.android.bundle inside the cached APK.
                cp _nativecache/app-release.apk "$WORK/app.apk"
                ( cd "$WORK" && zip -q app.apk assets/index.android.bundle )

                # 4) zipalign, then re-sign (modifying the zip invalidated the old signature).
                "${BT}zipalign" -f -p 4 "$WORK/app.apk" "$WORK/app-aligned.apk"
                "${BT}apksigner" sign \
                  --ks _nativecache/debug.keystore \
                  --ks-pass pass:android --key-pass pass:android --ks-key-alias androiddebugkey \
                  --out "$OUT" "$WORK/app-aligned.apk"
                "${BT}apksigner" verify "$OUT"
                echo "Re-signed APK ready at $OUT (Gradle skipped)."

      - deploy-to-bitrise-io@2: {}
    meta:
      bitrise.io:
        stack: ubuntu-noble-24.04-bitrise-2025-android
        machine_type_id: g2.linux.large

  # ==========================================================================================
  # iOS — fingerprint-based native-skip (DIY). Simulator build → no code signing needed.
  # ==========================================================================================
  build_ios_fingerprint:
    summary: |
      iOS twin of build_android_fingerprint. On a cache hit it reuses the cached simulator .app by
      swapping in a freshly built JS bundle — skipping the Xcode build entirely. Simulator build,
      so no certificates or provisioning profiles are required.
    description: |
      1. Fingerprint the native inputs → BUNDLE_HASH_STRING (JS excluded).
      2. restore-cache reports BITRISE_CACHE_HIT.
      3. MISS → expo prebuild (iOS) + pod install + xcode-build-for-simulator; cache the .app.
      4. HIT  → rebuild ONLY the JS bundle (Hermes), swap main.jsbundle inside the cached .app. No Xcode.
    steps:
      - git-clone@8: {}
      - restore-npm-cache@3: {}
      - npm@3:
          title: npm ci
          inputs:
            - command: ci
      - save-npm-cache@1: {}
      - git::https://github.com/bitrise-silver/steps-react-native-fingerprint.git@main:
          title: Fingerprint native inputs → cache key
          inputs:
            - file_paths: |-
                package.json
                package-lock.json
                app.json
            - key_prefix: build-fingerprint-ios
            - verbose: "true"
      - restore-cache@3:
          title: Restore cached simulator .app
          inputs:
            - key: $BUNDLE_HASH_STRING
      # ---------------- MISS: full simulator build ----------------
      - script@1:
          title: "Expo prebuild (iOS)"
          inputs:
            - content: |-
                #!/usr/bin/env bash
                set -euo pipefail
                echo "Cache MISS — generating the native iOS project…"
                npx expo prebuild --platform ios --no-install
      - cocoapods-install@3:
          inputs:
            - source_root_path: $BITRISE_SOURCE_DIR/ios
      - script@1:
          title: "[miss] Detect workspace + scheme (after CocoaPods)"
          run_if: '{{ enveq "BITRISE_CACHE_HIT" "false" }}'
          inputs:
            - content: |-
                #!/usr/bin/env bash
                set -euo pipefail
                # CocoaPods generates the .xcworkspace, so detect it AFTER pod install
                # (expo prebuild --no-install only creates the .xcodeproj).
                WS="$(ls -d ios/*.xcworkspace | head -1)"
                envman add --key BITRISE_PROJECT_PATH --value "$WS"
                envman add --key BITRISE_SCHEME --value "$(basename "$WS" .xcworkspace)"
                echo "Workspace: $WS  |  Scheme: $(basename "$WS" .xcworkspace)"
      - xcode-build-for-simulator@3:
          title: "[miss] Build .app for iOS Simulator"
          run_if: '{{ enveq "BITRISE_CACHE_HIT" "false" }}'
          inputs:
            - configuration: Release
            - output_dir: _iosbuild
      - script@1:
          title: "[miss] Cache the simulator .app"
          run_if: '{{ enveq "BITRISE_CACHE_HIT" "false" }}'
          inputs:
            - content: |-
                #!/usr/bin/env bash
                set -euo pipefail
                mkdir -p _nativecache
                rm -rf _nativecache/app.app
                # BITRISE_APP_DIR_PATH is exported by xcode-build-for-simulator.
                cp -R "$BITRISE_APP_DIR_PATH" _nativecache/app.app
                ( cd _nativecache && zip -qry "$BITRISE_DEPLOY_DIR/app-sim.zip" app.app )
                echo "Cached simulator .app ($(du -sh _nativecache/app.app | cut -f1))."
      - save-cache@1:
          title: "[miss] Save simulator .app for next time"
          run_if: '{{ enveq "BITRISE_CACHE_HIT" "false" }}'
          inputs:
            - key: $BUNDLE_HASH_STRING
            - paths: _nativecache

      # ---------------- HIT: reuse .app, swap JS bundle (fast) ----------------
      - script@1:
          title: "[hit] Swap JS bundle into cached .app (skip Xcode)"
          run_if: '{{ not (enveq "BITRISE_CACHE_HIT" "false") }}'
          inputs:
            - content: |-
                #!/usr/bin/env bash
                set -euo pipefail
                echo "Cache HIT — refreshing the JS bundle inside the cached .app (no Xcode)."
                APP="_nativecache/app.app"

                # Rebuild only the JS bundle (same command the native build embeds), for iOS.
                npx expo export:embed \
                  --platform ios \
                  --dev false \
                  --entry-file index.ts \
                  --bundle-output "$APP/main.jsbundle" \
                  --assets-dest "$APP"

                # Expo/RN default to Hermes → compile to bytecode (macOS hermesc).
                HERMESC="node_modules/react-native/sdks/hermesc/osx-bin/hermesc"
                if [ -x "$HERMESC" ]; then
                  echo "Hermes enabled — compiling bundle to bytecode…"
                  "$HERMESC" -emit-binary -O -out "$APP/main.jsbundle.hbc" "$APP/main.jsbundle"
                  mv "$APP/main.jsbundle.hbc" "$APP/main.jsbundle"
                fi

                # Simulator apps aren't code-signed, so no re-signing is needed — just repackage.
                ( cd _nativecache && zip -qry "$BITRISE_DEPLOY_DIR/app-sim.zip" app.app )
                echo "Swapped JS bundle into the cached .app (Xcode build skipped)."

      - deploy-to-bitrise-io@2: {}
    meta:
      bitrise.io:
        stack: osx-xcode-16.4.x
        machine_type_id: g2.mac.large

  # ==========================================================================================
  # iOS — same fingerprint skip, but the full (miss) build is accelerated by the MANAGED
  # Bitrise Build Cache for React Native (Xcode compilation cache). Needs Xcode 26+ and an
  # active Build Cache trial/subscription on the workspace.
  # ==========================================================================================
  build_ios_cache_fingerprint:
    summary: |
      Same as build_ios_fingerprint (JS-only changes hit the cache and swap the bundle), but the
      full build on a miss is accelerated by Bitrise Build Cache for React Native — so even a
      dependency change rebuilds faster instead of a cold Xcode compile.
    description: |
      HIT (JS-only)   → swap main.jsbundle into the cached .app (no Xcode), identical to build_ios_fingerprint.
      MISS (rebuild)  → activate-build-cache-for-react-native starts the Xcode cache proxy, then
                        xcode-build-for-simulator compiles with cached compiler outputs (much faster
                        than a cold build). The resulting .app is cached for the JS-only fast path.
    steps:
      - git-clone@8: {}
      - restore-npm-cache@3: {}
      - npm@3:
          title: npm ci
          inputs:
            - command: ci
      - save-npm-cache@1: {}
      - git::https://github.com/bitrise-silver/steps-react-native-fingerprint.git@main:
          title: Fingerprint native inputs → cache key
          inputs:
            - file_paths: |-
                package.json
                package-lock.json
                app.json
            - key_prefix: build-fingerprint-ios-cache
            - verbose: "true"
      - restore-cache@3:
          title: Restore cached simulator .app
          inputs:
            - key: $BUNDLE_HASH_STRING

      # ---------------- MISS: full simulator build, accelerated by Bitrise Build Cache ----------------
      - script@1:
          title: "Expo prebuild (iOS)"
          inputs:
            - content: |-
                #!/usr/bin/env bash
                set -euo pipefail
                echo "Cache MISS — generating the native iOS project…"
                npx expo prebuild --platform ios --no-install
      - cocoapods-install@3:
          inputs:
            - source_root_path: $BITRISE_SOURCE_DIR/ios
      - script@1:
          title: "[miss] Detect workspace + scheme (after CocoaPods)"
          run_if: '{{ enveq "BITRISE_CACHE_HIT" "false" }}'
          inputs:
            - content: |-
                #!/usr/bin/env bash
                set -euo pipefail
                # CocoaPods generates the .xcworkspace, so detect it AFTER pod install
                # (expo prebuild --no-install only creates the .xcodeproj).
                WS="$(ls -d ios/*.xcworkspace | head -1)"
                envman add --key BITRISE_PROJECT_PATH --value "$WS"
                envman add --key BITRISE_SCHEME --value "$(basename "$WS" .xcworkspace)"
                echo "Workspace: $WS  |  Scheme: $(basename "$WS" .xcworkspace)"
      - activate-build-cache-for-react-native@0:
          title: "[miss] Activate Bitrise Build Cache for React Native"
          run_if: '{{ enveq "BITRISE_CACHE_HIT" "false" }}'
      - script@1:
          title: "[miss] Build ios (Build Cache accelerated)"
          run_if: '{{ enveq "BITRISE_CACHE_HIT" "false" }}'
          inputs:
            - content: |-
                #!/usr/bin/env bash
                set -euo pipefail
                bitrise-build-cache react-native run npx eas-cli build --platform ios --local
      - script@1:
          title: "[miss] Cache the simulator .app"
          run_if: '{{ enveq "BITRISE_CACHE_HIT" "false" }}'
          inputs:
            - content: |-
                #!/usr/bin/env bash
                set -euo pipefail
                mkdir -p _nativecache
                rm -rf _nativecache/app.app
                cp -R "$BITRISE_APP_DIR_PATH" _nativecache/app.app
                ( cd _nativecache && zip -qry "$BITRISE_DEPLOY_DIR/app-sim.zip" app.app )
                echo "Cached simulator .app ($(du -sh _nativecache/app.app | cut -f1))."
      - save-cache@1:
          title: "[miss] Save simulator .app for next time"
          run_if: '{{ enveq "BITRISE_CACHE_HIT" "false" }}'
          inputs:
            - key: $BUNDLE_HASH_STRING
            - paths: _nativecache

      # ---------------- HIT: reuse .app, swap JS bundle (fast) ----------------
      - script@1:
          title: "[hit] Swap JS bundle into cached .app (skip Xcode)"
          run_if: '{{ not (enveq "BITRISE_CACHE_HIT" "false") }}'
          inputs:
            - content: |-
                #!/usr/bin/env bash
                set -euo pipefail
                echo "Cache HIT — refreshing the JS bundle inside the cached .app (no Xcode)."
                APP="_nativecache/app.app"
                npx expo export:embed \
                  --platform ios \
                  --dev false \
                  --entry-file index.ts \
                  --bundle-output "$APP/main.jsbundle" \
                  --assets-dest "$APP"
                HERMESC="node_modules/react-native/sdks/hermesc/osx-bin/hermesc"
                if [ -x "$HERMESC" ]; then
                  echo "Hermes enabled — compiling bundle to bytecode…"
                  "$HERMESC" -emit-binary -O -out "$APP/main.jsbundle.hbc" "$APP/main.jsbundle"
                  mv "$APP/main.jsbundle.hbc" "$APP/main.jsbundle"
                fi
                ( cd _nativecache && zip -qry "$BITRISE_DEPLOY_DIR/app-sim.zip" app.app )
                echo "Swapped JS bundle into the cached .app (Xcode build skipped)."

      - deploy-to-bitrise-io@2: {}
    meta:
      bitrise.io:
        stack: osx-xcode-26.6.x
        machine_type_id: g2.mac.large
